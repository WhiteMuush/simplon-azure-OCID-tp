stages:
  - build
  - push
  - deploy

variables:
  IMAGE_NAME: "python-app"
  # Image versioned by the short commit ID (brief's advice)
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  # Azure identifiers (NOT secrets: no password/key, auth is OIDC).
  # In clear here for simplicity; otherwise the same in Settings > CI/CD > Variables.
  AZURE_CLIENT_ID: "985f8362-00ff-42b4-bd8a-990c1535c775"
  AZURE_TENANT_ID: "a2e466aa-4f86-4545-b5b8-97da7c8febf3"
  AZURE_SUBSCRIPTION_ID: "697b55db-e8fc-4901-9c36-70c71778f7d5"
  RESOURCE_GROUP: "melvin-petit-dev"
  LOCATION: "francecentral"
  ACR_NAME: "acrmelvinpyweb"
  ACA_ENV: "cae-melvin-staging"
  ACA_NAME: "ca-melvin-pyweb-staging"
  MI_NAME: "gitlab-ci"

# -----------------------------------------------------------------------------
# Stage 1: build + smoke test
# Checks that the image builds and the container starts. Pushes nothing.
# Runs on all branches (the following stages only on main).
# -----------------------------------------------------------------------------
build-job:
  stage: build
  image: docker:27.3
  services:
    - docker:27.3-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $IMAGE_NAME .
    - docker run -d -p 8080:8080 --name CI $IMAGE_NAME
    - sleep 3
    - docker stop CI

# -----------------------------------------------------------------------------
# Stage 2: (creates the ACR if needed) build + push to Azure Container Registry
# The CI creates the registry itself (Contributor role on the RG). Since ACR
# Tasks is forbidden on this subscription, we build with docker-in-docker and
# push after an ACR login obtained via the OIDC identity (ephemeral token, no
# stored secret). Image tagged with the commit ID AND latest.
# -----------------------------------------------------------------------------
push-job:
  stage: push
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  image: mcr.microsoft.com/azure-cli:latest
  services:
    - docker:27.3-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  id_tokens:
    AZURE_OIDC_TOKEN:
      aud: api://AzureADTokenExchange
  before_script:
    # The azure-cli image (Azure Linux) has no docker client.
    - tdnf install -y docker-cli
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" --federated-token "$AZURE_OIDC_TOKEN"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    # Create the registry if it does not exist yet (idempotent).
    - az acr create -g "$RESOURCE_GROUP" -n "$ACR_NAME" --sku Basic --only-show-errors
    # Ephemeral ACR token via the OIDC identity (AcrPush role), no stored secret.
    - ACR_TOKEN=$(az acr login --name "$ACR_NAME" --expose-token --query accessToken -o tsv)
    - docker login "$ACR_NAME.azurecr.io" --username 00000000-0000-0000-0000-000000000000 --password "$ACR_TOKEN"
    - docker build -t "$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG" -t "$ACR_NAME.azurecr.io/$IMAGE_NAME:latest" .
    - docker push "$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
    - docker push "$ACR_NAME.azurecr.io/$IMAGE_NAME:latest"

# -----------------------------------------------------------------------------
# Stage 3: (creates the environment + the app if needed) deploy to ACA
# The CI creates the environment and the Container App on the first run, then
# only updates the image on later runs. The app pulls the image with the managed
# identity (AcrPull role). The public URL is exposed to GitLab as the "staging"
# environment (dynamic URL via a dotenv report).
# -----------------------------------------------------------------------------
deploy-job:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  image: mcr.microsoft.com/azure-cli:latest
  id_tokens:
    AZURE_OIDC_TOKEN:
      aud: api://AzureADTokenExchange
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" --federated-token "$AZURE_OIDC_TOKEN"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - az extension add --name containerapp --only-show-errors
    # Container Apps environment (idempotent).
    - az containerapp env create -g "$RESOURCE_GROUP" -n "$ACA_ENV" --location "$LOCATION" --only-show-errors
    - MI_ID=$(az identity show -g "$RESOURCE_GROUP" -n "$MI_NAME" --query id -o tsv)
    - IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
    # Create the app on the first run, otherwise just update the image.
    - |
      if az containerapp show -g "$RESOURCE_GROUP" -n "$ACA_NAME" >/dev/null 2>&1; then
        az containerapp update -g "$RESOURCE_GROUP" -n "$ACA_NAME" --image "$IMAGE"
      else
        az containerapp create -g "$RESOURCE_GROUP" -n "$ACA_NAME" \
          --environment "$ACA_ENV" --image "$IMAGE" \
          --target-port 8080 --ingress external \
          --user-assigned "$MI_ID" \
          --registry-server "$ACR_NAME.azurecr.io" --registry-identity "$MI_ID"
      fi
    # Expose the public URL to GitLab (dynamic environment).
    - FQDN=$(az containerapp show -g "$RESOURCE_GROUP" -n "$ACA_NAME" --query properties.configuration.ingress.fqdn -o tsv)
    - echo "DYNAMIC_ENV_URL=https://$FQDN" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  environment:
    name: staging
    url: $DYNAMIC_ENV_URL
